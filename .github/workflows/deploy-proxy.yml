name: Deploy signing proxy

on:
  push:
    branches: [main]
    paths:
      - "proxy/**"
      - ".github/workflows/deploy-proxy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.HETZNER_HOST }}" >> ~/.ssh/known_hosts

      # --delete keeps the VPS copy in sync with this repo. private-key/ only
      # ever exists on the VPS (gitignored, never in this checkout), and the
      # actual generated public-key/*.pem is likewise VPS-only (only a
      # .gitkeep placeholder lives in the repo, since the public key is
      # derived from the VPS-only private key) -- excluding both is what
      # stops --delete from wiping real, non-reproducible-from-git state.
      - name: Sync proxy config to VPS
        run: |
          rsync -az --delete \
            --exclude 'private-key/' \
            --exclude 'public-key/*.pem' \
            --exclude '.env' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            proxy/ "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}:/opt/flip-vehicle-widget-proxy/"

      # --force-recreate: plain `up -d` only recreates containers whose
      # *service definition* changed, not ones whose bind-mounted config
      # file (e.g. Caddyfile) changed content -- without this, a config-only
      # change silently keeps running with the old config until something
      # else forces a restart.
      - name: Restart stack
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}" \
            "cd /opt/flip-vehicle-widget-proxy && docker compose pull && docker compose up -d --force-recreate --remove-orphans"
