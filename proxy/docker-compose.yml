services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      - PROXY_DOMAIN=${PROXY_DOMAIN:?set PROXY_DOMAIN in proxy/.env}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./well-known:/srv/well-known
      - ./public-key:/srv/well-known/appspecific:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - tesla-http-proxy
      - oauth-relay

  # Holds TESLA_CLIENT_SECRET server-side and performs the OAuth token
  # exchange/refresh on the app's behalf -- Tesla's Fleet API requires a
  # client_secret on every token request, which must never be embedded in
  # the Android app itself (extractable from the APK). See oauth-relay/server.py.
  oauth-relay:
    image: python:3.12-alpine
    restart: unless-stopped
    environment:
      - TESLA_CLIENT_SECRET=${TESLA_CLIENT_SECRET:?set TESLA_CLIENT_SECRET in proxy/.env}
    volumes:
      - ./oauth-relay/server.py:/app/server.py:ro
    command: ["python3", "/app/server.py"]
    expose:
      - "8090"

  tesla-http-proxy:
    image: tesla/vehicle-command:latest
    security_opt:
      - no-new-privileges:true
    # Run as the host's deploy-user UID/GID (1000:1000, as created by the
    # cloud-init in this repo's setup guide) so the 600-permission key files
    # bind-mounted below stay readable -- the image's own default user
    # (65532) can't read files owned by a different host UID at 600.
    # Adjust if your deploy user has a different UID (check with `id deploy`).
    user: "1000:1000"
    restart: unless-stopped
    expose:
      - "443"
    volumes:
      - ./private-key/internal-tls-key.pem:/etc/tesla/tls-key.pem:ro
      - ./private-key/internal-tls-cert.pem:/etc/tesla/tls-cert.pem:ro
      - ./private-key/signing-key.pem:/etc/tesla/signing-key.pem:ro
    command:
      - "-tls-key=/etc/tesla/tls-key.pem"
      - "-cert=/etc/tesla/tls-cert.pem"
      - "-key-file=/etc/tesla/signing-key.pem"
      - "-host=0.0.0.0"
      - "-port=443"

volumes:
  caddy_data:
  caddy_config:
